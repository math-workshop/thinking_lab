<style>
  html, body, #root { margin: 0; padding: 0; width: 100%; height: 100%; background: #f4f0e6; font-family: "Manrope", system-ui, sans-serif; }
  body { overflow: hidden; }
  #root { position: relative; }

  /* ── Вступительная заставка ── */
  #splash {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 26px; text-align: center; cursor: pointer;
    background: radial-gradient(120% 120% at 50% 38%, #fbf7ec 0%, #f0e9d8 60%, #e7ddc6 100%);
    transition: opacity .7s ease, visibility .7s ease;
    -webkit-tap-highlight-color: transparent;
  }
  #splash.hide { opacity: 0; visibility: hidden; pointer-events: none; }
  #splash .sp-mark {
    width: 132px; height: 132px; border-radius: 30px;
    background: #c8553d; color: #f7f1e3;
    display: grid; place-items: center;
    font-family: "Lora", Georgia, serif; font-weight: 700; font-size: 84px; line-height: 1;
    box-shadow: 0 18px 44px -16px rgba(150,52,30,.6), inset 0 2px 0 rgba(255,255,255,.18);
    transform: translateY(14px) scale(.94); opacity: 0;
    animation: sp-mark-in .9s cubic-bezier(.2,.7,.2,1) .1s forwards;
  }
  #splash .sp-title {
    font-family: "Lora", Georgia, serif; font-weight: 600; color: #2a261f;
    font-size: 32px; line-height: 1.18; max-width: 16ch; margin: 0;
    opacity: 0; animation: sp-fade-up .8s ease .42s forwards;
  }
  #splash .sp-sub {
    font-family: "JetBrains Mono", monospace; font-size: 13px; letter-spacing: .04em;
    color: #8a7c64; margin: -10px 0 0;
    opacity: 0; animation: sp-fade-up .8s ease .58s forwards;
  }
  #splash .sp-enter {
    margin-top: 8px; display: inline-flex; align-items: center; gap: 10px;
    font-family: "Manrope", system-ui, sans-serif; font-weight: 600; font-size: 14px;
    color: #b14a30; padding: 11px 22px; border-radius: 999px;
    border: 1.5px solid #d99b86; background: rgba(255,255,255,.5);
    opacity: 0; animation: sp-fade-up .8s ease .8s forwards, sp-breathe 2.6s ease-in-out 1.6s infinite;
  }
  #splash .sp-enter .sp-arrow { transition: transform .3s ease; }
  #splash:hover .sp-enter .sp-arrow { transform: translateX(4px); }
  @keyframes sp-mark-in { to { transform: none; opacity: 1; } }
  @keyframes sp-fade-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  @keyframes sp-breathe { 0%,100% { transform: translateY(0); box-shadow: 0 0 0 0 rgba(201,85,61,0); } 50% { transform: translateY(-2px); box-shadow: 0 0 0 6px rgba(201,85,61,.06); } }
  @media (prefers-reduced-motion: reduce) { #splash * { animation-duration: .01ms !important; } }
</style>

<template id="__bundler_thumbnail" data-bg-color="#f4f0e6">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">

  </svg>
</template>
<div id="root"></div>

<div id="splash" role="button" tabindex="0" aria-label="Войти на сайт">
  <div class="sp-mark">М</div>
  <h1 class="sp-title">Мастерская математического мышления</h1>
  <p class="sp-sub">курс для 1–4 классов · Кинтас &amp; Корешкова</p>
  <span class="sp-enter">Войти <span class="sp-arrow">→</span></span>
</div>

<script>
  (function () {
    var splash = document.getElementById('splash');
    if (!splash) return;
    var dismissed = false;
    function dismiss() {
      if (dismissed) return;
      dismissed = true;
      splash.classList.add('hide');
      setTimeout(function () { if (splash && splash.parentNode) splash.parentNode.removeChild(splash); }, 800);
    }
    // Дать заставке показаться минимум ~1.4 c, затем разрешить вход по клику
    var ready = false;
    setTimeout(function () { ready = true; }, 1400);
    splash.addEventListener('click', function () { if (ready) dismiss(); });
    splash.addEventListener('keydown', function (e) {
      if (ready && (e.key === 'Enter' || e.key === ' ')) { e.preventDefault(); dismiss(); }
    });
  })();
</script>

<script type="text/babel">
const TWEAKS = /*EDITMODE-BEGIN*/{
  "palette": "palette-mono",
  "density": "dense",
  "hero": "discover3"
}/*EDITMODE-END*/;

function Root() {
  const [t, setTweak] = useTweaks(TWEAKS);
  const HERO_LABELS = {
    discover3: 'Большие открытия начинаются с маленьких задач!',
    discover: 'Каждая задача — маленькое открытие',
    discover2: 'Математика, где есть что открыть',
    adventure: 'Математика как приключение мысли',
    adventure2: 'Каждый урок — приключение мысли',
    adventure3: 'Математика, в которую хочется идти',
    original: 'Учим думать и считать — не списывать готовое',
  };
  return (
    <>
      <MMMApp paletteClass={t.palette} density={t.density} hero={t.hero}/>
      <TweaksPanel title="Tweaks">
        <TweakSection label="Заголовок главной">
          <TweakSelect label="Слоган" value={t.hero}
            options={Object.keys(HERO_LABELS).map(k=>({ value:k, label:HERO_LABELS[k] }))}
            onChange={(v)=>setTweak('hero', v)}
          />
        </TweakSection>
        <TweakSection label="Палитра">
          <TweakRadio label="Тема" value={t.palette}
            options={['palette-warm','palette-rose','palette-forest','palette-mono']}
            onChange={(v)=>setTweak('palette', v)}
          />
        </TweakSection>
        <TweakSection label="Плотность">
          <TweakRadio label="Интерфейс" value={t.density}
            options={['dense','normal','spacious']}
            onChange={(v)=>setTweak('density', v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
