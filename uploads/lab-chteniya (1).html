<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Лаборатория чтения задач · Мастерская математического мышления</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F7F1E5;
  --sheet:#FFFDF6;
  --ink:#2E2A24;
  --ink-soft:#6B6357;
  --terra:#C05B3C;
  --terra-soft:#E8C9BC;
  --olive:#6F7A4D;
  --olive-soft:#DDE2C9;
  --mustard:#D9A03F;
  --mustard-soft:#F2DFB6;
  --blue:#4E6E8E;
  --blue-soft:#CFDCE8;
  --line:#E4DAC8;
  --radius:14px;
  --shadow:0 2px 10px rgba(60,48,30,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Manrope',system-ui,sans-serif;
  font-size:16px;line-height:1.55;
  min-height:100vh;
}
#root{max-width:760px;margin:0 auto;padding:18px 16px 80px}
h1,h2,h3{font-family:'Lora',Georgia,serif;line-height:1.25}
button{font-family:inherit;font-size:inherit;cursor:pointer;border:none;background:none;color:inherit}
button:focus-visible,input:focus-visible{outline:3px solid var(--blue);outline-offset:2px;border-radius:6px}

/* ---------- home ---------- */
.home-head{text-align:center;margin:18px 0 6px}
.home-head .eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--terra);font-weight:700}
.home-head h1{font-size:clamp(28px,6vw,40px);margin:6px 0 8px}
.home-head p{color:var(--ink-soft);max-width:54ch;margin:0 auto}
.method-strip{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:18px 0 26px}
.method-strip span{font-size:12.5px;font-weight:600;background:var(--sheet);border:1px solid var(--line);border-radius:999px;padding:5px 12px;color:var(--ink-soft)}
.method-strip span b{color:var(--olive)}
.cards{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:560px){.cards{grid-template-columns:1fr 1fr}}
.card{
  text-align:left;background:var(--sheet);border:1px solid var(--line);
  border-radius:var(--radius);padding:18px 18px 16px;box-shadow:var(--shadow);
  transition:transform .15s ease, box-shadow .15s ease;display:block;width:100%;
}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(60,48,30,.14)}
.card .tag{display:inline-block;font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border-radius:6px;padding:3px 8px;margin-bottom:10px}
.tag-terra{background:var(--terra-soft);color:#8C3D24}
.tag-olive{background:var(--olive-soft);color:#4C5530}
.tag-mustard{background:var(--mustard-soft);color:#8A6217}
.tag-blue{background:var(--blue-soft);color:#33506C}
.card h3{font-size:19px;margin-bottom:6px}
.card p{font-size:14px;color:var(--ink-soft)}
.card .done-mark{float:right;color:var(--olive);font-weight:800}
.teacher-note{margin-top:30px;background:var(--sheet);border:1px dashed var(--line);border-radius:var(--radius);padding:14px 16px;font-size:13.5px;color:var(--ink-soft)}
.teacher-note summary{cursor:pointer;font-weight:700;color:var(--ink)}
.teacher-note ul{margin:8px 0 0 18px}
.teacher-note li{margin:4px 0}

/* ---------- problem frame ---------- */
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.back-btn{font-weight:700;color:var(--terra);padding:6px 10px;border-radius:8px}
.back-btn:hover{background:var(--terra-soft)}
.topbar h2{font-size:20px;flex:1}
.phasebar{display:flex;gap:4px;flex-wrap:wrap;margin:0 0 14px}
.phasebar span{font-size:11px;font-weight:700;letter-spacing:.04em;padding:4px 9px;border-radius:999px;background:var(--sheet);border:1px solid var(--line);color:var(--ink-soft)}
.phasebar span.cur{background:var(--olive);border-color:var(--olive);color:#fff}
.phasebar span.past{background:var(--olive-soft);border-color:var(--olive-soft);color:#4C5530}

/* «листок задачи» — фирменный элемент */
.sheet{
  background:var(--sheet);
  background-image:repeating-linear-gradient(transparent 0,transparent 27px,rgba(192,91,60,.08) 27px,rgba(192,91,60,.08) 28px);
  border:1px solid var(--line);border-radius:6px;box-shadow:var(--shadow);
  padding:16px 18px;line-height:28px;font-size:16.5px;
  transform:rotate(-.25deg);margin-bottom:18px;position:relative;
}
.sheet::before{content:"";position:absolute;left:34px;top:0;bottom:0;width:1px;background:rgba(78,110,142,.25)}
.sheet .pin{position:absolute;top:-9px;left:50%;transform:translateX(-50%);width:14px;height:14px;border-radius:50%;background:var(--terra);box-shadow:0 2px 4px rgba(0,0,0,.25)}
.sheet p{padding-left:24px}
.sp{transition:background .2s}
.sp.tap{cursor:pointer;border-radius:4px}
.sp.tap:hover{background:rgba(217,160,63,.25)}
.mk-q{background:linear-gradient(transparent 52%,rgba(217,160,63,.55) 52%);font-weight:600}
.mk-data{border-bottom:3px solid rgba(78,110,142,.55)}
.mk-rule{text-decoration:underline wavy var(--terra) 2px;text-underline-offset:4px;font-weight:600}
.mk-no{background:rgba(192,91,60,.25)}
.sp.block{display:block}

/* ---------- steps ---------- */
.step{background:var(--sheet);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
.step h3{font-size:18px;margin-bottom:4px}
.step .lead{color:var(--ink-soft);font-size:14.5px;margin-bottom:14px}
.qtext{font-weight:600;margin:14px 0 10px}
.opts{display:grid;gap:8px}
.opt{
  text-align:left;border:1.5px solid var(--line);border-radius:10px;background:#fff;
  padding:10px 14px;transition:all .15s;line-height:1.4;
}
.opt:hover{border-color:var(--mustard)}
.opt.ok{border-color:var(--olive);background:var(--olive-soft);font-weight:600}
.opt.no{border-color:var(--terra);background:var(--terra-soft);animation:shake .3s}
.opt:disabled{cursor:default}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@media(prefers-reduced-motion:reduce){.opt.no{animation:none}.card{transition:none}}
.note{margin-top:12px;background:var(--olive-soft);border-radius:10px;padding:10px 14px;font-size:14.5px}
.note b{color:#4C5530}
.warn-note{margin-top:10px;background:var(--terra-soft);border-radius:10px;padding:10px 14px;font-size:14px}
.solved-line{display:flex;gap:8px;align-items:baseline;font-size:14.5px;color:var(--ink-soft);margin-bottom:10px;border-bottom:1px dashed var(--line);padding-bottom:8px}
.solved-line .chk{color:var(--olive);font-weight:800}
.solved-line b{color:var(--ink)}

.numrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px}
.numrow input{
  width:110px;padding:9px 12px;border:1.5px solid var(--line);border-radius:10px;
  font-family:'JetBrains Mono',monospace;font-size:17px;background:#fff;
}
.numrow input.ok{border-color:var(--olive);background:var(--olive-soft)}
.numrow input.no{border-color:var(--terra);background:var(--terra-soft)}
.btn{
  background:var(--olive);color:#fff;font-weight:700;border-radius:10px;
  padding:10px 18px;transition:transform .1s;
}
.btn:hover{transform:translateY(-1px)}
.btn:disabled{opacity:.45;cursor:default;transform:none}
.btn-ghost{background:transparent;color:var(--olive);border:1.5px solid var(--olive)}
.hint-btn{font-size:13.5px;color:var(--blue);font-weight:600;text-decoration:underline;text-underline-offset:3px}
.hint-box{margin-top:8px;background:var(--blue-soft);border-radius:10px;padding:9px 13px;font-size:14px}
.nextwrap{margin-top:16px;text-align:right}
.banner{margin-top:14px;border-radius:10px;padding:12px 16px;font-weight:700;text-align:center}
.banner.contr{background:var(--terra);color:#fff;font-family:'Lora',serif;font-size:18px}
.banner.win{background:var(--olive);color:#fff;font-size:17px}

/* order cards */
.ocards{display:grid;gap:8px}
.ocard{
  text-align:left;border:1.5px solid var(--line);border-radius:10px;background:#fff;
  padding:10px 14px;display:flex;gap:10px;align-items:center;
}
.ocard:hover{border-color:var(--mustard)}
.ocard .num{
  min-width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:14px;background:var(--paper);border:1.5px dashed var(--line);color:var(--ink-soft);
}
.ocard.picked .num{background:var(--mustard);border-style:solid;border-color:var(--mustard);color:#fff}
.ocard.right{border-color:var(--olive);background:var(--olive-soft)}
.ocard.wrongo{border-color:var(--terra)}

/* truth table */
.ttable{display:grid;gap:6px;margin:12px 0}
.trow{display:grid;grid-template-columns:64px 1fr 1fr;gap:6px;align-items:stretch}
.trow .rl{font-size:12.5px;font-weight:700;color:var(--ink-soft);display:flex;align-items:center}
.tcell{border:1.5px solid var(--line);border-radius:8px;background:#fff;padding:6px 9px;font-size:13.5px;display:flex;align-items:center;gap:7px;justify-content:space-between}
.tcell .vbadge{font-weight:800;font-size:12px;border-radius:6px;padding:1px 7px;flex-shrink:0}
.tcell.vt{border-color:var(--olive);background:var(--olive-soft)}
.tcell.vt .vbadge{background:var(--olive);color:#fff}
.tcell.vf{border-color:var(--terra);background:var(--terra-soft)}
.tcell.vf .vbadge{background:var(--terra);color:#fff}
button.tcell{font-family:inherit;font-size:13.5px;text-align:left;width:100%}
.tcell:disabled{cursor:default;opacity:1}
.tcell.clk{cursor:pointer}
.tcell.clk:hover{border-color:var(--mustard);background:var(--mustard-soft)}
.tcell.wrongflash{animation:shake .3s;border-color:var(--terra);background:var(--terra-soft)}
.trow.badrow .rl{color:var(--terra)}
.trow.badrow .tcell{border-color:var(--terra);animation:shake .3s}

/* places board */
.places{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:12px 0}
.place{border:1.5px dashed var(--line);border-radius:10px;background:var(--paper);text-align:center;padding:8px 4px}
.place .pn{font-size:11px;font-weight:700;color:var(--ink-soft);letter-spacing:.06em}
.place .pv{font-family:'Lora',serif;font-weight:700;font-size:15px;min-height:22px}
.place.filled{border-style:solid;border-color:var(--olive);background:var(--olive-soft)}

/* bars */
.barwrap{margin:14px 0;display:grid;gap:10px}
.barrow{display:flex;align-items:center;gap:10px}
.barrow .blabel{width:92px;font-size:13px;font-weight:700;color:var(--ink-soft);text-align:right;flex-shrink:0}
.bar{display:flex;height:38px;border-radius:8px;overflow:hidden;flex:1;border:1.5px solid var(--ink)}
.bseg{display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.bseg.light{color:var(--ink);background:repeating-linear-gradient(45deg,#fff,#fff 6px,var(--paper) 6px,var(--paper) 12px)}

/* конструктор полоски */
.track{position:relative;height:42px;border:1.5px solid var(--ink);border-radius:8px;background:#fff;flex:1;min-width:0}
.track .seg{position:absolute;top:0;bottom:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;overflow:hidden;white-space:nowrap}
.track .seg.striped{background:repeating-linear-gradient(45deg,#fff,#fff 6px,var(--paper) 6px,var(--paper) 12px);color:var(--ink)}
.divline{position:absolute;left:50%;top:0;bottom:0;width:3px;background:var(--ink);transform:translateX(-1.5px);z-index:1}
.handle{position:absolute;top:-12px;bottom:-24px;width:34px;margin-left:-17px;cursor:ew-resize;touch-action:none;z-index:3}
.handle::before{content:"";position:absolute;left:15px;top:10px;bottom:22px;width:4px;background:var(--ink);border-radius:2px}
.handle .grip{position:absolute;left:4px;bottom:0;width:26px;height:26px;border-radius:50%;background:var(--mustard);border:2.5px solid #fff;box-shadow:var(--shadow)}
.tick{position:absolute;top:100%;width:2px;height:9px;background:var(--terra);transform:translateX(-1px)}
.halfslot{position:absolute;top:4px;bottom:4px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border-radius:6px;border:none;cursor:pointer;z-index:2}
.halfslot.empty{border:2px dashed var(--mustard);background:rgba(217,160,63,.08);color:var(--ink-soft)}
.chiprow{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 4px}
.chip{border:1.5px solid var(--line);border-radius:999px;padding:7px 14px;font-weight:700;background:#fff;font-size:14px}
.chip.sel{border-color:var(--mustard);background:var(--mustard-soft)}
.chip:disabled{opacity:.35;cursor:default}
.bracket{height:11px;border:2.5px solid var(--mustard);border-top:none;border-radius:0 0 7px 7px;position:relative;margin-top:1px}
.bracket span{position:absolute;top:11px;left:50%;transform:translateX(-50%);font-weight:800;font-size:12.5px;color:#8A6217;white-space:nowrap}

/* timeline */
.timeline{position:relative;margin:18px 6px 8px;padding-left:14px;border-left:3px solid var(--mustard)}
.tl-item{position:relative;padding:0 0 16px 16px;font-size:14px}
.tl-item::before{content:"";position:absolute;left:-22px;top:4px;width:13px;height:13px;border-radius:50%;background:var(--mustard);border:3px solid var(--sheet)}
.tl-item b{font-family:'Lora',serif}
.tl-item .sum{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--blue);font-weight:600}

/* circle explorer */
.circle-box{text-align:center}
.circle-box svg{max-width:330px;width:100%;height:auto}
.slider-row{display:flex;align-items:center;gap:12px;justify-content:center;margin:10px 0;flex-wrap:wrap}
.slider-row input[type=range]{flex:1;max-width:300px;accent-color:var(--olive)}
.nval{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;min-width:56px}
.arc-counts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:8px 0}
.arc-counts div{border-radius:10px;padding:8px 14px;font-size:14px;font-weight:600;background:var(--paper);border:1.5px solid var(--line)}
.arc-counts div.hit{border-color:var(--olive);background:var(--olive-soft)}
.found-chips{display:flex;gap:8px;justify-content:center;margin-top:10px}
.fchip{border-radius:999px;padding:6px 16px;font-weight:800;border:2px dashed var(--line);color:var(--ink-soft)}
.fchip.got{border-style:solid;border-color:var(--olive);background:var(--olive);color:#fff}
.legend{display:flex;gap:14px;justify-content:center;font-size:12.5px;color:var(--ink-soft);flex-wrap:wrap;margin-top:6px}
.legend i{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px}

/* режим учителя */
.modeswitch{display:flex;justify-content:center;margin:14px 0 2px}
.modeswitch button{padding:8px 20px;font-weight:700;border:1.5px solid var(--olive);background:#fff;color:var(--olive);font-size:14px}
.modeswitch button:first-child{border-radius:10px 0 0 10px;border-right:none}
.modeswitch button:last-child{border-radius:0 10px 10px 0}
.modeswitch button.on{background:var(--olive);color:#fff}
.teacher-intro{background:var(--sheet);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;margin:14px 0 18px;font-size:14.5px}
.teacher-intro b{color:#4C5530}
.tg-step{background:var(--sheet);border:1px solid var(--line);border-left:5px solid var(--olive);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px}
.tg-head{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.tg-phase{font-size:11px;font-weight:800;letter-spacing:.05em;background:var(--mustard-soft);color:#8A6217;border-radius:999px;padding:3px 10px}
.tg-step h4{font-family:'Lora',Georgia,serif;font-size:16.5px;margin:0}
.tg-what{font-size:14.5px;margin:6px 0 2px}
.tg-box{border-radius:10px;padding:9px 13px;font-size:13.5px;margin-top:8px;line-height:1.5}
.tg-method{background:var(--olive-soft)}
.tg-method b{color:#4C5530}
.tg-watch{background:var(--terra-soft)}
.tg-watch b{color:#8C3D24}

/* checklist */
.checks{display:grid;gap:8px;margin-top:10px}
.checkitem{display:flex;gap:10px;align-items:flex-start;text-align:left;border:1.5px solid var(--line);border-radius:10px;background:#fff;padding:10px 14px}
.checkitem:hover{border-color:var(--mustard)}
.checkitem.on{border-color:var(--olive);background:var(--olive-soft)}
.checkitem .box{width:22px;height:22px;border-radius:6px;border:2px solid var(--ink-soft);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;margin-top:1px}
.checkitem.on .box{background:var(--olive);border-color:var(--olive)}
.checkitem .ct{font-size:14.5px}
.checkitem .ct code{font-family:'JetBrains Mono',monospace;font-size:13px;background:var(--paper);padding:1px 5px;border-radius:4px}

/* takeaway */
.takeaway{background:var(--ink);color:var(--paper);border-radius:var(--radius);padding:20px;margin-top:16px}
.takeaway h3{color:var(--mustard);font-size:17px;margin-bottom:8px}
.takeaway p{font-size:14.5px;line-height:1.6}
.answer-card{background:var(--olive);color:#fff;border-radius:var(--radius);padding:18px;text-align:center;margin-top:16px}
.answer-card .al{font-size:12px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;opacity:.8}
.answer-card .av{font-family:'Lora',serif;font-size:20px;font-weight:700;margin-top:4px}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script type="text/babel">
const {useState, useMemo} = React;

/* ================= ОБЩИЕ ПРИМИТИВЫ ================= */

const PHASES = ["Чтение 1","Чтение 2","Чтение 3","Модель","Решение","Проверка"];

function PhaseBar({cur}){
  return (
    <div className="phasebar" aria-label="Этапы работы с задачей">
      {PHASES.map((p,i)=>(
        <span key={p} className={i===cur?"cur":(i<cur?"past":"")}>{i<cur?"✓ ":""}{p}</span>
      ))}
    </div>
  );
}

function Sheet({parts, marks, tapIds, onTap}){
  return (
    <div className="sheet">
      <span className="pin" aria-hidden="true"></span>
      <p>
        {parts.map(pt=>{
          const m = marks[pt.id] ? ("mk-"+marks[pt.id]) : "";
          const tappable = tapIds && tapIds.includes(pt.id);
          return (
            <span key={pt.id}
              className={"sp "+m+(tappable?" tap":"")+(pt.block?" block":"")}
              role={tappable?"button":undefined}
              tabIndex={tappable?0:undefined}
              onClick={tappable?()=>onTap(pt.id):undefined}
              onKeyDown={tappable?(e)=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();onTap(pt.id);}}:undefined}
            >{pt.text}{" "}</span>
          );
        })}
      </p>
    </div>
  );
}

function Choice({question, options, correct, note, onSolved}){
  const [wrong,setWrong]=useState(new Set());
  const [done,setDone]=useState(false);
  const pick=i=>{
    if(done) return;
    if(i===correct){ setDone(true); onSolved && onSolved(); }
    else { const w=new Set(wrong); w.add(i); setWrong(w); }
  };
  return (
    <div>
      <p className="qtext">{question}</p>
      <div className="opts">
        {options.map((o,i)=>(
          <button key={i}
            className={"opt"+(done&&i===correct?" ok":"")+(wrong.has(i)?" no":"")}
            disabled={done}
            onClick={()=>pick(i)}>{o}</button>
        ))}
      </div>
      {done && note && <div className="note">{note}</div>}
      {!done && wrong.size>0 && <div className="warn-note">Не торопись — вернись к тексту задачи и перечитай нужное место.</div>}
    </div>
  );
}

function NumCheck({label, answer, suffix, hint, onSolved}){
  const [v,setV]=useState("");
  const [st,setSt]=useState("idle");
  const [showHint,setShowHint]=useState(false);
  const check=()=>{
    if(parseInt(v,10)===answer){ setSt("ok"); onSolved && onSolved(); }
    else setSt("no");
  };
  return (
    <div>
      <p className="qtext">{label}</p>
      <div className="numrow">
        <input type="number" inputMode="numeric" value={v} disabled={st==="ok"}
          className={st==="ok"?"ok":(st==="no"?"no":"")}
          onChange={e=>{setV(e.target.value); if(st==="no") setSt("idle");}}

function SolveChain({items, onAllSolved}){
  const [idx,setIdx]=useState(0);
  const solved = (i)=>{
    if(items[i].apply) items[i].apply();
    if(i+1<items.length) setTimeout(()=>setIdx(i+1), 450);
    else onAllSolved && onAllSolved();
  };
  return (
    <div>
      {items.slice(0,idx).map((it,i)=>(
        <div className="solved-line" key={i}>
          <span className="chk">✓</span>
          <span>{it.summary || it.question || it.label} — <b>{it.answerText || it.options[it.correct]}</b></span>
        </div>
      ))}
      {items[idx] && (
        items[idx].type==="num"
          ? <NumCheck key={idx} {...items[idx]} onSolved={()=>solved(idx)}/>
          : <Choice key={idx} {...items[idx]} onSolved={()=>solved(idx)}/>
      )}
    </div>
  );
}

function OrderCards({cards, correctOrder, hint, onSolved}){
  const [seq,setSeq]=useState([]);
  const [state,setState]=useState("picking"); // picking | wrong | right
  const tap=id=>{
    if(state==="right") return;
    if(seq.includes(id)) return;
    const ns=[...seq,id];
    setSeq(ns); setState("picking");
    if(ns.length===cards.length){
      if(ns.every((x,i)=>x===correctOrder[i])){ setState("right"); onSolved&&onSolved(); }
      else setState("wrong");
    }
  };
  const reset=()=>{setSeq([]);setState("picking");};
  return (
    <div>
      <div className="ocards">
        {cards.map(c=>{
          const pos=seq.indexOf(c.id);
          const cls="ocard"+(pos>=0?" picked":"")+(state==="right"?" right":"")+(state==="wrong"&&pos>=0?" wrongo":"");
          return (
            <button key={c.id} className={cls} onClick={()=>tap(c.id)} disabled={state==="right"}>
              <span className="num">{pos>=0?pos+1:"·"}</span>
              <span>{c.t}</span>
            </button>
          );
        })}
      </div>
      {state==="wrong" && (
        <div className="warn-note">
          Порядок не сошёлся. {hint}{" "}
          <button className="hint-btn" onClick={reset}>Начать заново</button>
        </div>
      )}
      {state==="right" && <div className="note"><b>Точно!</b> Теперь события стоят так, как они происходили в жизни, а не так, как о них рассказали.</div>}
    </div>
  );
}

/* --- конструктор модели-полоски: ребёнок строит чертёж сам --- */

function usePctDrag(ref, setPct, opts){
  const {min=8, max=92, disabled=false} = opts || {};
  const dragging = React.useRef(false);
  const fromEvent = e => {
    const r = ref.current.getBoundingClientRect();
    const p = (e.clientX - r.left) / r.width * 100;
    return Math.max(min, Math.min(max, p));
  };
  return {
    onPointerDown: e => { if(disabled) return; dragging.current = true; e.currentTarget.setPointerCapture(e.pointerId); },
    onPointerMove: e => { if(!dragging.current || disabled) return; setPct(fromEvent(e)); },
    onPointerUp:   () => { dragging.current = false; },
    onPointerCancel: () => { dragging.current = false; },
  };
}

function SplitBar({onDone}){
  const ref=React.useRef(null);
  const [pct,setPct]=useState(31);
  const [fails,setFails]=useState(0);
  const [done,setDone]=useState(false);
  const drag=usePctDrag(ref,setPct,{disabled:done});
  const check=()=>{
    if(Math.abs(pct-50)<=4){ setPct(50); setDone(true); onDone(); }
    else setFails(f=>f+1);
  };
  const key=e=>{
    if(done) return;
    if(e.key==="ArrowLeft"){ setPct(p=>Math.max(8,p-2)); e.preventDefault(); }
    if(e.key==="ArrowRight"){ setPct(p=>Math.min(92,p+2)); e.preventDefault(); }
    if(e.key==="Enter") check();
  };
  return (
    <div>
      <p className="qtext">Шаг 1. Покажи на полоске, какую часть занимают пирожки с малиной: передвинь жёлтую ручку туда, где должна пройти граница.</p>

          <div className="seg" style={{left:0,width:pct+"%",background:"var(--terra)"}}></div>
          <div className="seg striped" style={{left:pct+"%",width:(100-pct)+"%"}}></div>
          {fails>=2&&!done&&<span className="tick" style={{left:"50%"}}></span>}

            aria-label="Граница деления полоски" aria-valuemin={8} aria-valuemax={92} aria-valuenow={Math.round(pct)}
            onKeyDown={key} {...drag}>
            <span className="grip" aria-hidden="true"></span>
          </div>
        </div>
      </div>
      {!done && <button className="btn" onClick={check}>Готово</button>}

      {done && <div className="note"><b>Точно!</b> Малина — половина всех пирожков, граница — ровно посередине. Теперь подпишем части.</div>}
    </div>
  );
}

function LabelHalves({onDone}){
  const CHIPS=["малина","черника + клубника","только клубника"];
  const [sel,setSel]=useState(null);
  const [slots,setSlots]=useState({L:null,R:null});
  const [msg,setMsg]=useState("");
  const [done,setDone]=useState(false);
  const used=v=>slots.L===v||slots.R===v;
  const colorOf=v=> v==="малина"?"var(--terra)":"var(--blue)";
  const place=side=>{
    if(done) return;
    if(sel===null){ setMsg("Сначала выбери подпись внизу, потом нажми на часть полоски."); return; }
    const ns={...slots,[side]:CHIPS[sel]};
    setSel(null);
    if(ns.L&&ns.R){
      const have=[ns.L,ns.R];
      if(have.includes("малина")&&have.includes("черника + клубника")){
        setSlots(ns); setMsg(""); setDone(true); onDone();
      } else if(ns.L===ns.R){
        setSlots({...ns,[side]:null});

      } else {
        setSlots({L:ns.L==="только клубника"?null:ns.L, R:ns.R==="только клубника"?null:ns.R});
        setMsg("Что-то не сходится. Малина — одна половина. А во второй прячутся ОБА оставшихся вида пирожков.");

  return (
    <div>

    </div>
  );
}

/* Движок дедукции: ребёнок ходит в любом корректном порядке */
const ST_DATA=[ [{who:"Серёжа",pl:2},{who:"Коля",pl:3}],
 [{who:"Серёжа",pl:2},{who:"Ваня",pl:4}],
 [{who:"Надя",pl:3},{who:"Толя",pl:5}],
 [{who:"Толя",pl:1},{who:"Надя",pl:2}],
 [{who:"Коля",pl:1},{who:"Ваня",pl:4}],
];
const ALL_KEYS=[];
for(let r=0;r<5;r++)for(let c=0;c<2;c++)ALL_KEYS.push(r+"-"+c);
const cellAt=k=>{const [r,c]=k.split("-").map(Number);return ST_DATA[r][c];};

function deduceCell(k,verdicts){
  const [r,c]=k.split("-").map(Number);
  const me=ST_DATA[r][c];
  const pv=verdicts[r+"-"+(1-c)];
  if(pv==="И") return {v:"Л", why:"в ответе "+(r+1)+" правда уже есть, по качелям эта часть обязана быть ложью"};
  if(pv==="Л") return {v:"И", why:"в ответе "+(r+1)+" ложь уже есть, по качелям эта часть обязана быть правдой"};
  for(const k2 of ALL_KEYS){
    if(k2===k) continue;
    const o=cellAt(k2);
    if(o.who===me.who&&o.pl===me.pl&&verdicts[k2])
      return {v:verdicts[k2], why:"это же утверждение уже отмечено в ответе "+(Number(k2.split("-")[0])+1)+" — одно утверждение, одна судьба"};
  }
  for(const k2 of ALL_KEYS){
    if(verdicts[k2]!=="И") continue;
    const o=cellAt(k2);
    if(o.pl===me.pl&&o.who!==me.who) return {v:"Л", why:me.pl+"-е место уже занято: там "+o.who};
    if(o.who===me.who&&o.pl!==me.pl) return {v:"Л", why:me.who+" уже занял "+o.pl+"-е место"};
  }
  return null;
}

function findContradictions(verdicts){
  const rows=new Set();
  for(let r=0;r<5;r++){
    const a=verdicts[r+"-0"], b=verdicts[r+"-1"];
    if(a&&b&&a===b) rows.add(r);
  }
  for(const k1 of ALL_KEYS) for(const k2 of ALL_KEYS){
    if(k1>=k2) continue;
    if(verdicts[k1]==="И"&&verdicts[k2]==="И"){
      const A=cellAt(k1), B=cellAt(k2);
      if((A.pl===B.pl&&A.who!==B.who)||(A.who===B.who&&A.pl!==B.pl)){
        rows.add(Number(k1.split("-")[0])); rows.add(Number(k2.split("-")[0]));
      }
    }
  }
  return rows;
}

function applyWithDuplicates(k,v,verdicts){
  const nv={...verdicts,[k]:v};
  const me=cellAt(k);
  let dup=false;
  for(const k2 of ALL_KEYS){
    const o=cellAt(k2);
    if(o.who===me.who&&o.pl===me.pl){ if(k2!==k&&!verdicts[k2]) dup=true; nv[k2]=v; }
  }
  return {nv,dup};
}

function DeduceChain({mode, premise, verdicts, setVerdicts, onPlace, places, showPlaces, onDone}){
  const [phase,setPhase]=useState("premise");
  const [done,setDone]=useState(false);
  const [log,setLog]=useState([]);
  const [wrong,setWrong]=useState(null);
  const [msg,setMsg]=useState("");
  const [bad,setBad]=useState(null);
  const [hint,setHint]=useState("");
  const labelOf=k=>{const [r,c]=k.split("-").map(Number);return STATEMENTS[r][c];};
  const flashWrong=(k,m)=>{ setWrong(k); setMsg(m); setTimeout(()=>setWrong(null),650); };

  const click=k=>{
    if(done) return;
    setMsg(""); setHint("");
    if(phase==="premise"){
      if(premise.cells.includes(k)){
        const {nv}=applyWithDuplicates(k,premise.verdict,verdicts);
        setVerdicts(nv);
        setLog(l=>[...l,labelOf(k)+" — "+(premise.verdict==="И"?"правда":"ложь")+" (наша гипотеза). Это же утверждение окрасилось и во втором ответе"]);
        setPhase("work");
      } else flashWrong(k,"Сначала отметим саму гипотезу: ищи часть «Серёжа — 2-й».");
      return;
    }
    if(verdicts[k]) return;
    const d=deduceCell(k,verdicts);
    if(!d){ flashWrong(k,"Про эту часть пока нельзя сказать наверняка: ни правило качелей, ни занятые места её не определяют. Поищи часть, чья судьба уже предрешена."); return; }
    const {nv,dup}=applyWithDuplicates(k,d.v,verdicts);
    setVerdicts(nv);
    setLog(l=>[...l,labelOf(k)+" — "+(d.v==="И"?"правда":"ложь")+": "+d.why+(dup?". И это же утверждение окрасилось в другом ответе":"")]);
    if(d.v==="И"&&onPlace){ const me=cellAt(k); onPlace(me.pl, me.who); }
    const contr=findContradictions(nv);
    if(mode==="contradiction"&&contr.size>0){
      setBad(contr); setDone(true); onDone();
      return;
    }
    if(mode==="complete"&&ALL_KEYS.every(x=>nv[x])){ setDone(true); onDone(); }
  };

  const giveHint=()=>{
    for(const k of ALL_KEYS){
      if(!verdicts[k]&&deduceCell(k,verdicts)){ setHint("Присмотрись к ответу "+(Number(k.split("-")[0])+1)+"."); return; }
    }
  };

  return (
    <div>
      {log.map((t,i)=>(<div className="solved-line" key={i}><span className="chk">✓</span><span>{t}</span></div>))}
      {phase==="premise" && !done && <p className="qtext">👉 {premise.prompt}</p>}
      {phase==="work" && !done && <p className="qtext">👉 Нажимай на любую часть, судьбу которой уже можно определить ТОЧНО, — в любом порядке. Тренажёр сам поймёт по твоим ходам, правда это или ложь.</p>}
      <TruthTable verdicts={verdicts} clickable={!done} onCell={click} wrongKey={wrong} badRows={bad}/>
      {showPlaces && <PlacesBoard places={places}/>}
      {msg && !done && <div className="warn-note">{msg}</div>}
      {phase==="work" && !done && (hint
        ? <div className="hint-box">💡 {hint}</div>
        : <p style={{marginTop:8}}><button className="hint-btn" onClick={giveHint}>Подсказка</button></p>)}
    </div>
  );
}

/* Свободная разметка таблицы для проверки: правда → ложь → снять */
const CROSS_EXPECTED={"0-0":"Л","0-1":"И","1-0":"Л","1-1":"И","2-0":"Л","2-1":"И","3-0":"Л","3-1":"И","4-0":"Л","4-1":"И"};

function FreeTruthCheck({places, onSolved}){
  const [fv,setFv]=useState({});
  const [bad,setBad]=useState(null);
  const [msg,setMsg]=useState("");
  const [done,setDone]=useState(false);
  const toggle=k=>{
    if(done) return;
    setBad(null); setMsg("");
    setFv(v=>{
      const c={...v};
      if(!c[k]) c[k]="И";
      else if(c[k]==="И") c[k]="Л";
      else delete c[k];
      return c;
    });
  };
  const check=()=>{
    const marked=Object.keys(CROSS_EXPECTED).filter(k=>fv[k]).length;
    if(marked<10){ setMsg("Пока отмечено "+marked+" из 10 частей. Каждая часть — либо правда, либо ложь: разметь все."); return; }
    const ruleBad=new Set();
    for(let r=0;r<5;r++){
      const a=fv[r+"-0"], b=fv[r+"-1"];
      if(!((a==="И"&&b==="Л")||(a==="Л"&&b==="И"))) ruleBad.add(r);
    }
    if(ruleBad.size>0){
      setBad(ruleBad);
      setMsg("В подсвеченных ответах нарушено правило задачи: каждый болельщик один раз сказал правду и один раз соврал.");
      return;
    }
    const placeBad=new Set();
    Object.keys(CROSS_EXPECTED).forEach(k=>{ if(fv[k]!==CROSS_EXPECTED[k]) placeBad.add(parseInt(k,10)); });
    if(placeBad.size>0){
      setBad(placeBad);
      setMsg("Правило качелей в каждой строке соблюдено, но в подсвеченных ответах отметки спорят с доской мест. Сверь каждую часть с местами бегунов.");
      return;
    }
    setDone(true); setBad(null); setMsg(""); onSolved();
  };
  return (
    <div>
      <PlacesBoard places={places}/>
      <p className="qtext">Теперь без подсказок: глядя на доску мест, разметь всю таблицу сам. Нажатие на часть: первое — «правда», второе — «ложь», третье — снимает отметку.</p>
      <TruthTable verdicts={fv} clickable={!done} free onCell={toggle} badRows={bad}/>
      {!done && <button className="btn" onClick={check}>Проверить разметку</button>}
      {msg && !done && <div className="warn-note">{msg}</div>}
      {done && <div className="note"><b>Всё сходится!</b> В каждом ответе ровно одна правда и одна ложь — как и требовало условие. И забавная находка: все болельщики соврали в первой части ответа, а правду сказали во второй.</div>}
    </div>
  );
}

        {S.ok
          ? <Choice question="«Каждый один раз сказал правду, а один раз соврал». Что это значит для КАЖДОГО ответа из двух частей?"

    ()=>(
      <StepShell phase={2} title="Потренируем правило" lead="Прежде чем решать — убедимся, что «качели» понятны." solved={S.ok} onNext={S.next}>
        <TruthTable verdicts={{}}/>
        <SolveChain onAllSolved={S.solve} items={[
          {question:"Если в ответе 1 часть «Серёжа — 2-й» — правда, то часть «Коля — 3-й» — …?",
           options:["тоже правда","обязательно ложь","может быть и так, и так"], correct:1,
           summary:"Качели в ответе 1"},
          {question:"А ещё «Серёжа — 2-й» встречается и в ответе 2. Если это правда в ответе 1, то в ответе 2 эта же часть…",
           options:["тоже правда — это же одно и то же утверждение","может быть ложью","зависит от болельщика"], correct:0,

        {S.ok && <div className="note"><b>Отлично сработано!</b> Противоречие — не ошибка, а находка: теперь мы ТОЧНО знаем, что «Серёжа — 2-й» — ложь.</div>}

        <DeduceChain mode="complete"

          <Choice question="Все места, кроме одного, заняты. Какое место у Серёжи?"

            onSolved={()=>{setP(1,"Серёжа"); S.solve();}}/>
        )}
      </StepShell>
    ),
    ()=>(
      <StepShell phase={5} title="Взгляд назад" lead="Ответ найден, но решение не готово, пока не проверено по правилу задачи." solved={S.ok} onNext={()=>onComplete()} nextLabel="Готово! ✓">
        <FreeTruthCheck places={places} onSolved={S.solve}/>

      </StepShell>

  ];

  return (
    <div>
      <Sheet parts={CROSS_PARTS} marks={marks} tapIds={S.i===1&&!S.ok?CROSS_PARTS.map(p=>p.id):null} onTap={tapRule}/>

    </div>
  );
}

function CircleExplorer({onBothFound}){
  const [n,setN]=useState(36);
  const [found,setFound]=useState(new Set());
  const half=n/2;
  const mew=7;
  const shortPeople = half - mew - 1;       // между Мью и Дью по дуге без Лью
  const longPeople  = n - (half - mew) - 1; // по дуге через Лью
  const hitShort = shortPeople===26;
  const hitLong  = longPeople===26;

  React.useEffect(()=>{
    if(hitShort||hitLong){
      setFound(f=>{
        if(f.has(n)) return f;
        const nf=new Set(f); nf.add(n);
        if(nf.size===2) onBothFound();
        return nf;
      });
    }
  },[n]);

  const R=120, CX=160, CY=160;
  const dots=[];
  for(let i=0;i<n;i++){
    const ang=-Math.PI/2 + i*2*Math.PI/n;
    const x=CX+R*Math.cos(ang), y=CY+R*Math.sin(ang);
    let fill="#C9BFA9", r=3.4;
    if(i===0){fill="var(--olive)";r=8;}
    else if(i===half){fill="var(--terra)";r=8;}
    else if(i===mew){fill="var(--mustard)";r=8;}
    else if(i>0&&i<mew){fill="#A8B380";r=4;}            // 6 между Лью и Мью
    else if(i>mew&&i<half){fill="var(--blue)";r=4;}      // короткая дуга Мью–Дью
    else {fill="#B9A98E";r=4;}                           // длинная дуга через Лью
    dots.push(<circle key={i} cx={x} cy={y} r={r} fill={fill}/>);
  }
  const lbl=(idx,text)=>{
    const ang=-Math.PI/2 + idx*2*Math.PI/n;
    const x=CX+(R+22)*Math.cos(ang), y=CY+(R+22)*Math.sin(ang)+4;
    return <text x={x} y={y} textAnchor="middle" fontSize="13" fontWeight="700" fontFamily="Manrope">{text}</text>;
  };

  return (
    <div className="circle-box">
      <svg viewBox="0 0 320 320" role="img" aria-label={"Хоровод из "+n+" пиратов"}>
        <circle cx={CX} cy={CY} r={R} fill="none" stroke="var(--line)" strokeWidth="1.5"/>
        {dots}
        {lbl(0,"Лью")}{lbl(half,"Дью")}{lbl(mew,"Мью")}
      </svg>
      <div className="slider-row">
        <span style={{fontSize:13,fontWeight:700,color:"var(--ink-soft)"}}>пиратов:</span>
        <input type="range" min="34" max="72" step="2" value={n}
          onChange={e=>setN(parseInt(e.target.value,10))}
          aria-label="Число пиратов в хороводе"/>
        <span className="nval">{n}</span>
      </div>
      <div className="arc-counts">
        <div className={hitShort?"hit":""}>между Дью и Мью <b>по синей дуге</b>: {shortPeople} {hitShort?"✓ 26!":""}</div>
        <div className={hitLong?"hit":""}>между Дью и Мью <b>по дуге через Лью</b>: {longPeople} {hitLong?"✓ 26!":""}</div>
      </div>
      <div className="legend">
        <span><i style={{background:"var(--olive)"}}></i>Лью</span>
        <span><i style={{background:"var(--terra)"}}></i>Дью</span>
        <span><i style={{background:"var(--mustard)"}}></i>Мью</span>
        <span><i style={{background:"#A8B380"}}></i>6 человек между Лью и Мью</span>
      </div>
      <div className="found-chips">
        <span className={"fchip"+(found.has(40)?" got":"")}>{found.has(40)?"✓ ":""}40 пиратов</span>
        <span className={"fchip"+(found.has(68)?" got":"")}>{found.has(68)?"✓ ":""}68 пиратов</span>
      </div>
      {found.size===1 && <p className="lead" style={{marginTop:10}}>Один ответ найден! Но слово «могло» намекает: поищи ещё. Попробуй, чтобы 26 человек оказались на <b>другой</b> дуге.</p>}
    </div>
  );
}

      </div>
    </div>
  );
}

function Home({done, open, mode, switchMode}){
  return (
    <div>
      <header className="home-head">
        <div className="eyebrow">Мастерская математического мышления</div>
        <h1>Лаборатория чтения задач</h1>
        <p>{mode==="teacher"
          ? "Режим учителя: каждая задача раскрыта целиком — все шаги с методическими комментариями."
          : "Здесь не решают «побыстрее». Здесь учатся читать условие так, чтобы решение находилось само."}</p>
      </header>
      <div className="modeswitch" role="tablist" aria-label="Режим">
        <button className={mode==="student"?"on":""} onClick={()=>switchMode("student")}>Ученикам</button>
        <button className={mode==="teacher"?"on":""} onClick={()=>switchMode("teacher")}>Учителю</button>
      </div>
      {mode==="teacher" && (
        <div className="teacher-intro">
          <b>Как пользоваться.</b> Откройте задачу — увидите текст, ответ и все шесть шагов сразу, с методической основой и точками наблюдения. Кнопка внизу разбора открывает тот же тренажёр глазами ученика. Метод един для всех задач: <b>читаем как историю → находим вопрос → размечаем и переводим → строим модель → решаем → смотрим назад</b> (протокол «Три прочтения» + фазы Пойа). Подсказки везде ведут к модели, а не к ответу. Ссылку без «#teacher» давайте детям; ссылка с «#teacher» открывает этот режим (это удобство, а не защита).
        </div>
      )}
      <div className="method-strip" aria-label="Метод работы">
        <span><b>1</b> читаем как историю</span>
        <span><b>2</b> находим вопрос</span>
        <span><b>3</b> размечаем данные</span>
        <span><b>4</b> строим модель</span>
        <span><b>5</b> решаем</span>
        <span><b>6</b> смотрим назад</span>
      </div>
      <div className="cards">
        {PROBLEMS.map(p=>(
          <button key={p.id} className="card" onClick={()=>open(p.id)}>
            {done.has(p.id) && <span className="done-mark">✓ пройдено</span>}
            <span className={"tag "+p.tagClass}>{p.tag}</span>
            <h3>{p.title}</h3>
            <p>{p.desc}</p>
          </button>
        ))}
      </div>

    </div>
  );
}

function App(){
  const [mode,setMode]=useState((window.location.hash||"").includes("teacher")?"teacher":"student");
  const [screen,setScreen]=useState("home");
  const [done,setDone]=useState(new Set());
  const switchMode=m=>{
    setMode(m);
    try{ window.location.hash = (m==="teacher" ? "teacher" : ""); }catch(e){}
  };
  const cur=PROBLEMS.find(p=>p.id===screen);
  if(!cur){
    return <Home done={done} mode={mode} switchMode={switchMode} open={id=>{setScreen(id);window.scrollTo(0,0);}}/>;
  }
  if(mode==="teacher"){
    return <TeacherView problem={cur}
      onExit={()=>{setScreen("home");window.scrollTo(0,0);}}
      openAsStudent={()=>{switchMode("student");window.scrollTo(0,0);}}/>;
  }
  const Comp=cur.comp;
  return (
    <div>
      <div className="topbar">
        <button className="back-btn" onClick={()=>setScreen("home")}>← Задачи</button>
        <h2>{cur.title}</h2>
      </div>
      <Comp key={cur.id} onComplete={()=>{
        setDone(d=>{const nd=new Set(d); nd.add(cur.id); return nd;});
        setScreen("home"); window.scrollTo(0,0);
      }}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
