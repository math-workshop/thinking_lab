<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Математические гонки</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100vw; height:100vh; overflow:hidden; background:#0a0e2a; }
#stars { position:fixed; inset:0; pointer-events:none; }
.star { position:absolute; background:#fff; border-radius:50%;
  animation:twinkle var(--d,2s) ease-in-out infinite alternate; }
@keyframes twinkle { from{opacity:0.2;transform:scale(0.8)} to{opacity:1;transform:scale(1.3)} }
#track { position:fixed; left:0; right:0; top:12vh; bottom:12vh;
  background:linear-gradient(180deg,#111830 0%,#1a2244 15%,#1e2850 50%,#1a2244 85%,#111830 100%);
  border-top:2px solid rgba(255,255,255,0.12); border-bottom:2px solid rgba(255,255,255,0.12); overflow:hidden; }
#track::after { content:''; position:absolute; left:0; right:0; top:50%; transform:translateY(-50%);
  height:3px;
  background:repeating-linear-gradient(90deg,rgba(255,255,255,0.18) 0px,rgba(255,255,255,0.18) 40px,transparent 40px,transparent 80px);
  animation:dashMove 1.2s linear infinite; }
@keyframes dashMove { from{background-position:0 0} to{background-position:80px 0} }
#finish { position:absolute; right:0; top:0; bottom:0; width:32px;
  background:repeating-conic-gradient(#fff 0% 25%,#222 0% 50%) 0 0/16px 16px; opacity:0.7; }
.car-lane { position:absolute; left:0; display:flex; align-items:center; }
.car-svg { position:absolute; transform-origin:center center; }
.trail { height:4px; border-radius:2px; position:absolute; }
@keyframes trailPulse { from{opacity:0.3} to{opacity:0.65} }
.border-strip { position:fixed; left:0; right:0; height:12vh;
  background:linear-gradient(135deg,#0d1235 0%,#151c42 40%,#0d1235 100%); }
#borderTop { top:0; } #borderBottom { bottom:0; }
.dice-deco { position:fixed; pointer-events:none; }
.dice-deco svg { filter:drop-shadow(0 4px 12px rgba(0,0,0,0.5)); }
@keyframes spinA  { from{transform:rotate(0deg)}   to{transform:rotate(360deg)}  }
@keyframes spinB  { from{transform:rotate(0deg)}   to{transform:rotate(-360deg)} }
@keyframes floatY { from{transform:translateY(-6px)} to{transform:translateY(6px)} }
@keyframes bob0{from{transform:translateY(-4px)}to{transform:translateY(4px)}}
@keyframes bob1{from{transform:translateY(-3px)}to{transform:translateY(5px)}}
@keyframes bob2{from{transform:translateY(-5px)}to{transform:translateY(3px)}}
@keyframes bob3{from{transform:translateY(-4px)}to{transform:translateY(6px)}}
@keyframes bob4{from{transform:translateY(-6px)}to{transform:translateY(2px)}}
@keyframes bob5{from{transform:translateY(-3px)}to{transform:translateY(5px)}}
@keyframes bob6{from{transform:translateY(-5px)}to{transform:translateY(3px)}}
@keyframes bob7{from{transform:translateY(-4px)}to{transform:translateY(4px)}}
@keyframes bob8{from{transform:translateY(-3px)}to{transform:translateY(6px)}}
@keyframes bob9{from{transform:translateY(-6px)}to{transform:translateY(3px)}}
@keyframes bob10{from{transform:translateY(-4px)}to{transform:translateY(5px)}}
.confetti { position:fixed; border-radius:3px; pointer-events:none; animation:fall linear infinite; }
@keyframes fall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1}
                 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }
</style>
</head>
<body>
<div id="stars"></div>
<div class="border-strip" id="borderTop"></div>
<div id="track"><div id="finish"></div><div id="lanes"></div></div>
<div class="border-strip" id="borderBottom"></div>
<div id="diceLayer"></div>
<div id="confettiLayer"></div>
<script>
const C={2:{bg:'#E53935',rim:'#b71c1c'},3:{bg:'#F4511E',rim:'#bf360c'},4:{bg:'#FB8C00',rim:'#e65100'},
5:{bg:'#F9A825',rim:'#f57f17'},6:{bg:'#43A047',rim:'#1b5e20'},7:{bg:'#1E88E5',rim:'#0d47a1'},
8:{bg:'#8E24AA',rim:'#4a148c'},9:{bg:'#00ACC1',rim:'#006064'},10:{bg:'#D81B60',rim:'#880e4f'},
11:{bg:'#6D4C41',rim:'#3e2723'},12:{bg:'#546E7A',rim:'#263238'}};

function lighten(hex,f){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
return '#'+[r,g,b].map(v=>Math.min(255,Math.round(v+(255-v)*f)).toString(16).padStart(2,'0')).join('');}

function carSVG(n,size){const c=C[n],sh=lighten(c.bg,0.22),gl='rgba(210,238,255,0.80)',fs=n>=10?13:16;
const h=Math.round(size*78/54);
return `<svg viewBox="0 0 54 78" width="${size}" height="${h}" xmlns="http://www.w3.org/2000/svg">
<ellipse cx="27" cy="75" rx="20" ry="3.5" fill="rgba(0,0,0,0.14)"/>
<rect x="5" y="5" width="44" height="68" rx="14" fill="${c.bg}"/>
<path d="M11,70 Q27,78 43,70" fill="${c.bg}"/>
<rect x="8" y="5" width="38" height="7" rx="4" fill="${sh}" opacity="0.55"/>
<rect x="13" y="55" width="28" height="12" rx="5" fill="${gl}" stroke="rgba(255,255,255,0.4)" stroke-width="0.7"/>
<rect x="15" y="11" width="24" height="10" rx="4" fill="${gl}" stroke="rgba(255,255,255,0.35)" stroke-width="0.7"/>
<rect x="13" y="22" width="28" height="28" rx="9" fill="${sh}"/>
<rect x="0" y="57" width="10" height="16" rx="3.5" fill="#0a0a0a"/>
<rect x="44" y="57" width="10" height="16" rx="3.5" fill="#0a0a0a"/>
<rect x="2" y="59" width="6" height="12" rx="2" fill="${c.rim}"/>
<rect x="46" y="59" width="6" height="12" rx="2" fill="${c.rim}"/>
<rect x="0" y="7" width="10" height="16" rx="3.5" fill="#0a0a0a"/>
<rect x="44" y="7" width="10" height="16" rx="3.5" fill="#0a0a0a"/>
<rect x="2" y="9" width="6" height="12" rx="2" fill="${c.rim}"/>
<rect x="46" y="9" width="6" height="12" rx="2" fill="${c.rim}"/>
<text x="27" y="39" text-anchor="middle" dominant-baseline="middle"
font-family="Arial,sans-serif" font-size="${fs}" font-weight="900"
fill="${n===5?'#111':'#fff'}">${n}</text></svg>`;}

const DOTS={1:[[50,50]],2:[[72,28],[28,72]],3:[[72,28],[50,50],[28,72]],
4:[[28,28],[72,28],[28,72],[72,72]],5:[[28,28],[72,28],[50,50],[28,72],[72,72]],
6:[[28,25],[72,25],[28,50],[72,50],[28,75],[72,75]]};
function diceSVG(face,size){const s=size,r=Math.round(s*0.18);
const dots=DOTS[face].map(([x,y])=>`<circle cx="${x*s/100}" cy="${y*s/100}" r="${s*0.11}" fill="#1a1a3a"/>`).join('');
return `<svg viewBox="0 0 ${s} ${s}" width="${s}" height="${s}" xmlns="http://www.w3.org/2000/svg">
<rect x="2" y="2" width="${s-4}" height="${s-4}" rx="${r}" fill="white" stroke="rgba(0,0,0,0.12)" stroke-width="1.5"/>
<rect x="4" y="4" width="${s-8}" height="${s*0.18}" rx="${r*0.6}" fill="rgba(255,255,255,0.45)"/>
${dots}</svg>`;}

// Звёзды
const starsEl=document.getElementById('stars');
for(let i=0;i<120;i++){const s=document.createElement('div');s.className='star';
const sz=Math.random()*2+0.8;
s.style.cssText=`left:${Math.random()*100}vw;top:${Math.random()*100}vh;width:${sz}px;height:${sz}px;--d:${1.2+Math.random()*2.5}s;animation-delay:${Math.random()*3}s;`;
starsEl.appendChild(s);}

// Машинки
const RACE=[{n:7,xPct:84,lane:5},{n:6,xPct:70,lane:3},{n:8,xPct:70,lane:7},
{n:5,xPct:56,lane:2},{n:9,xPct:56,lane:8},{n:4,xPct:42,lane:1},{n:10,xPct:42,lane:9},
{n:3,xPct:28,lane:4},{n:11,xPct:28,lane:6},{n:2,xPct:14,lane:0},{n:12,xPct:14,lane:10}];

const lanesEl=document.getElementById('lanes');
const TRACK_H=window.innerHeight*0.76;
const LANE_H=TRACK_H/11;
const CAR_W=Math.max(26,Math.min(50,LANE_H*0.62));

RACE.forEach((r,i)=>{
  const laneY=LANE_H*r.lane+LANE_H*0.5;
  const carH=Math.round(CAR_W*78/54);
  const wrap=document.createElement('div');
  wrap.className='car-lane';
  wrap.style.cssText=`top:${laneY-carH*0.5}px;left:0;right:0;height:${carH}px;animation:bob${i} ${0.6+Math.random()*0.6}s ease-in-out infinite alternate;`;
  // след
  const trail=document.createElement('div');
  trail.className='trail';
  const trailW=Math.round(window.innerWidth*r.xPct/100*0.18);
  trail.style.cssText=`background:linear-gradient(90deg,transparent,${C[r.n].bg});width:${trailW}px;left:${Math.round(window.innerWidth*r.xPct/100)-trailW}px;top:50%;transform:translateY(-50%);animation:trailPulse 0.9s ease-in-out infinite alternate;`;
  // машинка
  const carDiv=document.createElement('div');
  carDiv.className='car-svg';
  carDiv.style.cssText=`left:${r.xPct}vw;top:${(carH-CAR_W)*0.5}px;transform:translateX(-50%) rotate(-90deg);`;
  carDiv.innerHTML=carSVG(r.n,CAR_W);
  wrap.appendChild(trail);
  wrap.appendChild(carDiv);
  lanesEl.appendChild(wrap);
});

// Кубики
const diceLayer=document.getElementById('diceLayer');
[{face:6,left:'2vw',top:'1vh',sz:80,sp:'spinA 8s linear infinite',fl:'floatY 2.2s ease-in-out infinite alternate'},
 {face:1,right:'2vw',top:'1vh',sz:70,sp:'spinB 10s linear infinite',fl:'floatY 1.8s ease-in-out infinite alternate'},
 {face:4,left:'2vw',bottom:'1vh',sz:75,sp:'spinA 12s linear infinite',fl:'floatY 2.5s ease-in-out infinite alternate'},
 {face:5,right:'2vw',bottom:'1vh',sz:85,sp:'spinB 9s linear infinite',fl:'floatY 2.0s ease-in-out infinite alternate'},
 {face:3,cx:true,top:'0.5vh',sz:60,sp:'spinA 15s linear infinite',fl:'floatY 3s ease-in-out infinite alternate'},
].forEach(d=>{
  const w=document.createElement('div');w.className='dice-deco';
  let pos='';
  if(d.left)   pos+=`left:${d.left};`;
  if(d.right)  pos+=`right:${d.right};`;
  if(d.top)    pos+=`top:${d.top};`;
  if(d.bottom) pos+=`bottom:${d.bottom};`;
  if(d.cx)     pos+=`left:50%;transform:translateX(-50%);`;
  w.style.cssText=pos+`animation:${d.fl};`;
  const inn=document.createElement('div');inn.style.animation=d.sp;
  inn.innerHTML=diceSVG(d.face,d.sz);w.appendChild(inn);diceLayer.appendChild(w);
});

// Конфетти
const confLayer=document.getElementById('confettiLayer');
const CC=['#FF6B35','#FFD700','#00E5FF','#FF1744','#69FF47','#FF4081','#fff'];
for(let i=0;i<35;i++){const el=document.createElement('div');el.className='confetti';
const sz=5+Math.random()*8;
el.style.cssText=`left:${Math.random()*100}vw;width:${sz}px;height:${sz*(0.4+Math.random()*0.8)}px;background:${CC[Math.floor(Math.random()*CC.length)]};animation-duration:${3+Math.random()*5}s;animation-delay:${-Math.random()*6}s;opacity:${0.5+Math.random()*0.5};`;
confLayer.appendChild(el);}
</script>
</body>
</html>
